name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-server:
    name: Server Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          SESSION_SECRET: ci-placeholder-secret

  test-client:
    name: Client Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests
        run: npm test
        env:
          NODE_ENV: test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check — server JS files (node --check)
        run: |
          find server -name "*.js" \
            -not -path "*/node_modules/*" \
            -print0 \
          | xargs -0 -r node --check

  deploy-staging:
    name: Deploy → Staging
    needs: [test-server, test-client, lint]
    runs-on: ubuntu-latest
    # Any branch except master — so PRs and feature branches go to staging
    if: github.ref != 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Create players.csv stub (gitignored — Dockerfile requires it)
        run: echo "name,password_hash,role" > players.csv

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to poker-trainer-staging
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-prod:
    name: Deploy → Production
    needs: [test-server, test-client, lint]
    runs-on: ubuntu-latest
    # Only master merges go to prod
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to poker-trainer-ysav55
        run: flyctl deploy --config fly.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
