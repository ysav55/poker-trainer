name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test-server:
    name: Server Tests (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
        env:
          NODE_ENV: test
          # Tests set their own SESSION_SECRET inline; this satisfies any top-level require
          SESSION_SECRET: ci-placeholder-secret

  test-client:
    name: Client Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest tests
        run: npm test
        env:
          NODE_ENV: test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check — server JS files (node --check)
        # Parses every .js file; catches syntax errors without a full ESLint setup.
        # JSX files require eslint + react plugin — add that when ESLint is configured.
        run: |
          find server -name "*.js" \
            -not -path "*/node_modules/*" \
            -print0 \
          | xargs -0 -r node --check
