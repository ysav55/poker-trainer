app = "poker-trainer-staging"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT                 = "3001"
  NODE_ENV             = "production"
  IDLE_TIMEOUT_MINUTES = "20"

[http_service]
  internal_port       = 3001
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory   = "512mb"
  cpu_kind = "shared"
  cpus     = 1
