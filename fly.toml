app = "poker-trainer-ysav55"
primary_region = "iad"

[build]

[mounts]
  source = "poker_data"
  destination = "/data"

[env]
  DATABASE_PATH = "/data/poker_trainer.sqlite"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
